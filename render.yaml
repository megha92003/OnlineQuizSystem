services:
  - type: web
    name: online-quiz-system-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromConnect: true # Or provide the Neon URL manually if not using Render Connect
      - key: PYTHON_VERSION
        value: 3.10.0
