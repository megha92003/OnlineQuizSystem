services:
  - type: web
    name: online-quiz-system-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromConnect: true # Or provide the Neon URL manually if not using Render Connect
      - key: PYTHON_VERSION
        value: 3.10.0
